# cargo-deny configuration for wohl.
#
# Scope: bans, licenses, advisories, sources. Tuned conservatively for
# the first PR in #8 — duplicate-versions and unmaintained advisories
# warn rather than fail so we get visibility without redding CI on day 1.
# Strict-dedup and tighter advisory gating can come in a follow-up
# (see issue #8 follow-ups).

[graph]
# Check the whole workspace as cargo sees it. wohl runs only on Linux
# targets in CI (no_std components are platform-agnostic, but their
# transitive build-graph today resolves cleanly on x86_64-unknown-linux-gnu).
all-features = true

[licenses]
# Confidence threshold for license-file detection (askalono).
confidence-threshold = 0.93
# Policy allow-list. The first block is licenses currently present in
# the resolved graph (`cargo deny list`); the second block is forward-
# looking allowances we accept without further review. cargo-deny
# emits a `license-not-encountered` warning for unused entries — that
# is informational, not a failure.
allow = [
    # Currently present in the wohl graph.
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "Unicode-3.0",
    "Unlicense",
    # Pre-approved for future deps (no review needed if a new
    # transitive shows up under one of these).
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "Zlib",
]

[bans]
# Wildcard deps: the wohl workspace itself has `path = "..."` deps to
# the sibling relay crates, which cargo-deny categorizes alongside
# wildcards in the "spec" sense. Allow for now.
wildcards = "allow"
# Duplicate versions: warn so we see drift, but don't fail the gate
# on day one. Strict-dedup is a follow-up.
multiple-versions = "warn"
# Don't ban any specific crate yet.
deny = []
# No skips needed yet — if multiple-versions starts being noisy, add
# `skip = [...]` here with a justification.
skip = []

[advisories]
# RUSTSEC IDs we explicitly accept. Each ignore is STRUCTURED with an owner
# and a re-evaluate-by date in `reason` (wohl#30). cargo-deny 0.16 has no
# per-ignore `expires` field, so the date lives in the reason (greppable) and
# this cargo-deny job — which runs on every PR — is the standing alert: if the
# advisory situation changes (a fix lands, or a NEW advisory appears on these
# dep chains), the job surfaces it. Owner is the embedded/supply-chain line.
ignore = [
    { id = "RUSTSEC-2026-0110", reason = "bare-metal deprecated; transitive via wohl-fw-door-bench -> stm32g0xx-hal 0.2 -> cortex-m 0.7.x. Advisory's own Solution is 'No safe upgrade available' — the migration target (critical-section) is not in the cortex-m 0.7.x line the ecosystem pins. OWNER: PulseEngine embedded. RE-EVALUATE BY 2026-10-01 (or when cortex-m 0.8 stabilises + stm32g0xx-hal releases against it)." },
    { id = "RUSTSEC-2026-0009", reason = "time 0.3.45 RFC-2822 stack-exhaustion DoS; transitive via wohl-matter-bridge -> rs-matter -> domain 0.10.4 (pins time). wohl never calls RFC-2822 parsing (rs-matter uses time only for cert validity intervals). OWNER: PulseEngine. RE-EVALUATE BY 2026-10-01 (or when rs-matter/domain bumps time >= 0.3.47)." },
    { id = "RUSTSEC-2024-0436", reason = "paste 1.0.15 unmaintained; transitive via wohl-matter-bridge -> rs-matter -> pinned-init -> paste. Crate still functions; rs-matter upstream tracks migration off pinned-init. OWNER: PulseEngine. RE-EVALUATE BY 2026-10-01 (or when rs-matter drops the dependency)." },
]
# Yanked crates in the lockfile: warn, don't fail — yanks can happen
# mid-CI run.
yanked = "warn"

[sources]
# Only crates.io and the wohl/relay/rivet git repos. The path-deps
# in this workspace resolve to local sibling checkouts, which cargo-deny
# treats as path sources (always allowed).
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# Git sources we explicitly trust. Each entry MUST be pinned by `rev` in
# Cargo.toml (never `branch` or `tag` against a moving ref).
#
# project-chip/rs-matter — pinned in crates/wohl-matter-bridge/Cargo.toml
#   behind the `rs-matter-backend` feature. Pinned to a specific commit
#   because crates.io `rs-matter = "0.1.0"` (July 2023) predates the
#   current API surface entirely. Three workspace members resolve to
#   this repo via the git dep: rs-matter, rs-matter-codegen,
#   rs-matter-macros. See DESIGN.md §3 in wohl-matter-bridge.
allow-git = [
    "https://github.com/project-chip/rs-matter",
]
