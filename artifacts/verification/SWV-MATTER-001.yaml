artifacts:
  - id: SWV-MATTER-001
    type: sw-verification
    title: Matter integration SW verification
    status: proposed
    description: >
      SW-level verification PLAN for how the Matter Bridge will
      satisfy the MATTER family of software requirements
      (SWREQ-MATTER-001 through SWREQ-MATTER-005) and the
      architectural shape decided in SWARCH-WOHL-007.

      STATUS NOTE: this artifact is `proposed`, not `approved`,
      until at least one of the integration tests below is wired
      into CI. The 0.3.0-architecture PR (the architecture +
      traceability + skeleton foundation) provides the trait
      surface, cluster mapping table, and unit tests on the
      LoggingBridge stub — but no rs-matter wire integration runs
      anywhere yet. Treat the `verifies` links below as a
      verification plan; the mechanical evidence lands when the
      live rs-matter integration PR turns
      `RsMatterBridge::publish_*` into real calls and adds
      `IV-MATTER-001` integration tests.

      UPDATE (0.3.0, interop gate): "no rs-matter wire integration runs
      anywhere yet" is no longer true. The `matter-interop` CI job runs the
      host bridge as a real commissionable device
      (examples/matter-device.rs, RsMatterBridge) and drives it with the
      INDEPENDENT CHIP reference controller, chip-tool: PASE (Secure Pairing
      Success) -> CASE (Sigma1/2/3) -> NOC install -> "Commissioning
      complete ... success", then an operational read of
      BooleanState::StateValue on the WaterLeakDetector endpoint
      ("StateValue: FALSE"). This decisively covers SWREQ-MATTER-002
      (commissioning) and SWREQ-MATTER-001 (a controller sees sensor state
      as a bridged endpoint) against a foreign stack — killing the
      rs-matter-vs-rs-matter self-consistency risk. Running it also caught a
      real bug the wasm-vs-wasm gate could not: the host bridge lacked the
      rustcrypto feature, so it panicked at startup in DummyCrypto::rand
      (the live commissioning loop had never actually executed). Still
      `proposed` overall — multi-admin (003), persistence (004), and the
      bridged-update/latency path (005) remain planned.

      Verification methods, by requirement:

      - SWREQ-MATTER-001 (ecosystem visibility): integration test —
        the matter-bridge crate exposes a `MatterBridge` trait, and
        a Matter controller commissioning against an rs-matter-backed
        build sees sensor state as bridged endpoints.

      - SWREQ-MATTER-002 (commissioning): integration test using
        chip-tool or ember-mdns to discover the bridge, run PASE
        with a known setup code, and complete CASE handshake.
        Negative test: closed-window discovery fails.

      - SWREQ-MATTER-003 (multi-admin): integration test
        commissioning two distinct fabrics, asserting independent
        subscription state and ACL enforcement.

      - SWREQ-MATTER-004 (persistence): kill-and-restart test —
        commission, SIGKILL wohl-hub, restart, verify the controller
        does not need to re-commission. Corruption negative test on
        FabricRecord disk format.

      - SWREQ-MATTER-005 (bridged updates): property test on the
        cluster mapping (exhaustive enum match against AlertKind /
        ReadingKind). End-to-end latency test from sensor event to
        Matter Report tx, measured under controlled load. Unit
        conversion property test (round-trip wohl values through the
        bridge boundary).

      Coverage gates: the wohl-matter-bridge crate is in scope for
      the standard cargo-llvm-cov line/branch coverage gate.
      `RsMatterBridge` integration tests run under the
      `rs-matter-backend` Cargo feature.

      Out of scope for 0.3.0: MC/DC truth tables via witness apply
      only to wasm-component crates. The bridge runs host-side
      (Linux process) and is not yet wasm-componentized.

      Sigil attestation step (release-signing) is also out of scope
      for this PR — the architecture/traceability/skeleton bundle
      ships no new build artifact. The existing `release.yml`
      pipeline (SLSA build provenance + cosign keyless signing of
      SHA256SUMS) continues to sign wohl-hub binary releases. When
      the live `rs-matter-backend` integration lands and the
      `wohl-matter-bridge` crate is published or vendored into a
      release tarball, the same release-signing chain applies
      without modification.
    tags: [verification, matter, swe-6]
    fields:
      method: automated-test
    links:
      - type: verifies
        target: SWREQ-MATTER-001
      - type: verifies
        target: SWREQ-MATTER-002
      - type: verifies
        target: SWREQ-MATTER-003
      - type: verifies
        target: SWREQ-MATTER-004
      - type: verifies
        target: SWREQ-MATTER-005
