artifacts:
  - id: SWV-MATTER-002
    type: sw-verification
    title: "Matter verified-core (WASM) SW verification"
    status: proposed
    description: >
      SW-level verification for SWARCH-WOHL-008 — the claim that the
      rs-matter protocol+crypto core can run as a verified WASM
      component, with transport/clock/entropy host-imported.

      STATUS NOTE: this artifact is `proposed`, not `approved`, and is
      deliberately split into evidence that exists today vs. evidence
      still owed. Following the SWV-MATTER-001 precedent: a verification
      artifact is not `approved` until its mechanical evidence is wired
      into CI.

      PROVEN today (reproducible evidence):

      - C1 "core compiles as a WASM component" — CI-GATED. The
        `bazel build //:all` job builds `//:wohl-matter-core`
        (rust_wasm_component_bindgen, wasi p3) on every PR. Green as of
        PR #35 (run 26651676994). This is a live gate.

      - C2 "PASE handshake runs in WASM" — REPRODUCED, NOT YET CI-GATED.
        `crates/wohl-matter-core/spike2-exec` builds via
        `cargo build --target wasm32-wasip2` and, under
        `wasmtime run`, completes a full SPAKE2+ PASE handshake
        (`PASE-RUNS-OK`, exit 0; PR #36). The harness is a standalone
        cargo bin (own [workspace], excluded from the wohl workspace,
        not a bazel target), so CI does not run it yet.

      - C3 "handshake runs across the wac_compose'd WIT boundary" —
        REPRODUCED, NOT YET CI-GATED. `crates/wohl-matter-core/
        spike2c-compose` builds two components (mcore + transport shell),
        `wac plug`s them, and under `wasmtime run` completes a full
        SPAKE2+ PASE handshake with every packet crossing the WIT seam
        (`PASE-RUNS-OK across the wac-composed WIT seam`). FIDELITY
        CAVEAT: the seam used is a hand-written channelled byte pipe, not
        the exact spar-generated matter-world seam, and clock/entropy
        stay component-internal — so this proves the architecture is
        runnable; the faithful spar-seam binding is part of C4.

      OWED before this artifact can be `approved`:

      - C4 "the composed graph builds via rules_wasm_component (binding
        the real spar-generated matter-world seam: on-message_in /
        emit-message_out + on-clock_in + on-entropy_in) and a
        wasmtime execution of the PASE handshake runs in CI" — turns C2
        from a local reproduction into a live gate.

      - C5 MC/DC: SWV-MATTER-001 scoped out witness MC/DC truth tables
        because "the bridge runs host-side and is not yet
        wasm-componentized." SWARCH-WOHL-008 changes that for the core —
        once the component lands, the new decision points in the seam
        glue (transport poll/clock/entropy mapping) are in scope for a
        witness truth table.

      Clean-room (loop step 7): a cold verification agent with no inherited
      context independently reproduced C1 (read main's BUILD.bazel:
      @wohl_crates//:rs-matter), C2 (rebuilt spike2-exec, ran under wasmtime,
      PASE-RUNS-OK char-for-char, exit 0), and C5 (rivet validate PASS,
      artifacts proposed). For C3/C4 it confirmed every reproducible
      precursor (both 2c components build to the exact filenames; the exact
      success string is in mcore source; matter.wit carries the exact
      on-clock_in/on-entropy_in signatures) but its sandbox denied `wac` and
      `spar codegen` outright, so it could not run the compose/codegen steps
      themselves — those were executed and captured in the authoring session.
      No claim was refuted.

      Sigil: the wac_compose'd component is a new build artifact; when it
      lands it enters the release-signing attestation chain (release.yml
      already does SLSA build provenance + cosign keyless signing). The
      `sigil` and `witness` tools are present as sibling repos but are not
      built in the current environment, so the witness MC/DC truth table
      (C5 above) and a sigil-specific signature are deferred to the landing
      PR; the wasm artifact is ready for both.
    tags: [verification, matter, wasm, verified-core, swe-6]
    fields:
      method: automated-test
    links:
      # `verifies` may target only sw-req (rivet schema). SWARCH-WOHL-008 is
      # traced through the requirement it is allocated-from (SWREQ-MATTER-002),
      # which this verification verifies — mirroring SWARCH-WOHL-007's pattern.
      - type: verifies
        target: SWREQ-MATTER-002
