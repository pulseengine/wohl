artifacts:
  - id: SWARCH-WOHL-002
    type: sw-arch-component
    title: Sensor node architecture (ESP32/STM32 via Gale)
    status: approved
    description: >
      Each sensor node runs on an ESP32-C3 or STM32G0 microcontroller with
      Synth-compiled WASM components executed by the Gale runtime. The node
      reads physical sensors via hardware abstraction, encodes readings as
      WIT-typed records (temperature, water-event, air-quality, contact-event,
      power-reading), and publishes them as typed streams to the hub.

      Node firmware is generated by Synth from WIT component definitions.
      Gale provides verified kernel primitives (scheduling, ring buffers)
      for the embedded runtime. Communication to the hub uses a lightweight
      transport (BLE, Zigbee, or Wi-Fi depending on node variant).
    tags: [sensor-node, embedded, esp32, stm32, gale]
    fields:
      interfaces:
        provided:
          - "stream<temperature> — from thermistor/DHT22/BME280"
          - "stream<water-event> — from water presence probe"
          - "stream<air-quality> — from SGP30/SCD40/PMS5003"
          - "stream<contact-event> — from magnetic reed switch"
          - "stream<power-reading> — from CT clamp / energy IC"
        required:
          - "Gale runtime (ring_buf, scheduler, poll)"
          - "HAL driver for sensor IC"
          - "Transport driver (BLE/Zigbee/Wi-Fi)"
      resource-budgets:
        flash: "256 KB (ESP32-C3) / 64 KB (STM32G0)"
        ram: "32 KB usable"
        stack-allocation: "heapless — no heap, all stack/static"
    links:
      - type: allocated-from
        target: SWREQ-LEAK-001
      - type: allocated-from
        target: SWREQ-TEMP-001
      - type: allocated-from
        target: SWREQ-AIR-001
      - type: allocated-from
        target: SWREQ-DOOR-001
