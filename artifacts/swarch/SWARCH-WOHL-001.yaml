artifacts:
  - id: SWARCH-WOHL-001
    type: sw-arch-component
    title: Component stream architecture (overall data flow)
    status: implemented
    description: >
      The Wohl system is composed of stream transformer components following
      the Relay pattern. Sensor nodes publish typed streams which flow into
      monitor components on the hub. Each monitor transforms its input stream
      into stream<alert>. All alert streams merge into the Alert Dispatcher
      which deduplicates, rate-limits, and delivers notifications.

      Data flow:
        Sensors (ESP32/Zigbee)
          -> stream<temperature>  -> TemperatureMonitor -+
          -> stream<water-event>  -> LeakDetector -------+
          -> stream<air-quality>  -> AirMonitor ---------+-> stream<alert> -> AlertDispatcher -> notifications
          -> stream<contact>      -> DoorWatch ----------+
          -> stream<power>        -> PowerMeter ---------+

      All components are no_std, no_alloc. Composition is stream wiring
      via the Relay scheduler. No shared mutable state between components.

      The logical thread architecture — 7 priority-scheduled monitor threads
      plus the dispatcher, water-leak highest (safety-critical) — is modeled
      in spar/wohl_system.aadl; this artifact is its requirement-side view.
    tags: [architecture, stream, data-flow, aadl]
    fields:
      interfaces:
        provided:
          - "stream<alert> — unified alert output from all monitors"
          - "notifications — push, email, buzzer outputs"
        required:
          - "pulseengine:wohl-sensors/sensors — all sensor input types"
          - "pulseengine:wohl-actuators/actuators — alert and switch outputs"
          - "pulseengine:relay-common-types/types — stream transport"
          - "pulseengine:relay-time/time — scheduler and timestamps"
          - "pulseengine:relay-events/events — event bus"
      concurrency: >
        Multi-threaded, priority-scheduled — NOT single-threaded. Seven monitor
        threads plus the dispatcher, priority-ordered with water-leak highest
        (safety-critical), per spar/wohl_system.aadl. Realized as rate-monotonic
        preemption on Gale/STM32H743 and POSIX highest-priority-first on RPi4.
        The Relay Scheduler is the dispatch abstraction; components hold no
        shared mutable state, so wiring is data-flow, not lock-based.
    links:
      - type: allocated-from
        target: SWREQ-LEAK-001
      - type: allocated-from
        target: SWREQ-TEMP-001
      - type: allocated-from
        target: SWREQ-AIR-001
      - type: allocated-from
        target: SWREQ-DOOR-001
      - type: allocated-from
        target: SWREQ-ALERT-001
