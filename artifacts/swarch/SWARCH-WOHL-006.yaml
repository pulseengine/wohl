artifacts:
  - id: SWARCH-WOHL-006
    type: sw-arch-component
    title: "Design decision: sensor-to-Matter boundary — CCSDS sensors, hub Matter Bridge"
    status: approved
    description: >
      DESIGN DECISION (2026-05-22). Wohl integrates with the Matter
      smart-home ecosystem through the HUB acting as a Matter Bridge —
      not by making sensors native Matter devices.

      Chosen — Option A: sensors emit the compact CCSDS wire format; the
      hub translates to Matter and presents each sensor as a Matter
      bridged endpoint.

      Rejected — Option B: sensors implement the full Matter application
      stack over Thread (standalone Matter devices).

      Rationale:
        - Verification (decisive). Wohl's differentiator is formally
          verified firmware — Kani BMC, Verus, no_std, no_alloc. A
          Matter + OpenThread stack is several hundred KB of allocating
          third-party C/C++, structurally outside Kani and Verus.
          Option B would reduce the verified portion of the sensor to a
          thin shim over an unverified stack and dissolve the
          "Verified. Always on." claim. Option A keeps verification
          end-to-end: lean verified sensor -> CCSDS -> verified hub
          monitors -> verified alert dispatcher.
        - Footprint. Option B forces roughly a 16x flash / 32x RAM jump
          in sensor silicon (STM32G031K8, 64 KB / 8 KB, to an
          STM32WB55RG-class part, 1 MB / 256 KB). Option A runs on
          small, low-cost MCUs.
        - Certification. Option B needs Matter certification per sensor
          SKU. Option A needs at most one hub Matter-Bridge
          certification covering all sensor types.
        - Transport. Wohl retains sub-GHz as a wireless fallback (see
          the transport architecture). Matter is IP / Thread / Wi-Fi
          only, so a sub-GHz sensor can never be Matter-native — the
          hub bridge is mandatory regardless. Option A is the only
          uniform architecture across all transports.
        - Market check. Low-cost "Matter" sensors are predominantly
          Zigbee bridged through a vendor hub, not standalone Matter;
          genuine Matter-over-Thread sensors ship oversized batteries
          to absorb the protocol duty cycle. Low retail price reflects
          volume and amortized certification, not cheap engineering.

      The Matter stack lives on the hub (a Linux- or STM32H7-class
      device), explicitly outside the sensor safety boundary. A
      standalone Matter-native sensor SKU, if ever pursued, shall be a
      separate product line and shall not alter the verified line's
      firmware architecture.

      REFINEMENT (SWARCH-WOHL-008, 0.3.0): "the *unverified* Matter stack
      lives on the hub" is now too absolute. Spike 2 proved the hub's
      Matter protocol + crypto core (TLV, secure channel / PASE-CASE,
      RustCrypto, data model) builds AND runs as a verified
      wasm32-wasip2 component, with only host-bound non-determinism
      (UDP/mDNS transport, monotonic clock, entropy) imported across a
      WIT seam. So the accurate hub split is: Matter *transport I/O* is
      unverified host-side; Matter *protocol + crypto* is
      verifiable-in-component. This strengthens — does not weaken — the
      "Verified. Always on." claim: the most security-sensitive hub code
      (the commissioning handshake) moves inside the verification
      boundary. See SWARCH-WOHL-008.
    tags: [architecture, decision, matter, bridge, ccsds, verification]
    fields:
      interfaces:
        provided:
          - "Matter bridged endpoints — sensor state and alerts exposed to the Matter fabric (hub side)"
        required:
          - "pulseengine:relay-ccsds — CCSDS sensor wire format, sensor-to-hub transport"
      concurrency: "Matter bridge runs on the hub, outside the verified monitor scheduler"
    links:
      - type: allocated-from
        target: SWREQ-MATTER-001
