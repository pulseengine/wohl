name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Pinned sibling-repo commits — bumped explicitly via PR. Without these
  # pins, unpinned `main` of relay/rivet can change tool behavior on this
  # workflow with zero wohl code change (see #8 for the concrete
  # incident that motivated pinning).
  #
  # IMPORTANT: every cross-repo checkout below uses `fetch-depth: 0`
  # because relay/rivet are routinely force-pushed by the architect.
  # Without a full fetch, an orphaned (rebased-away) SHA fails to
  # resolve under actions/checkout's default shallow strategy.
  RELAY_REF: 178ffd479ad863c91ece4f580379a9207c36a530
  RIVET_REF: 78f001e23d595ba816f7a7be59282194dedfdc12
  # Pinned rules_wasm_component for Bazel-running jobs (verus, future
  # bazel build //...). wohl's MODULE.bazel uses local_path_override
  # for local dev; CI checks out the pinned ref into a sibling path so
  # the override resolves.
  RULES_WASM_COMPONENT_REF: fbe20571eee9bd05687c95e7a43f6c236d9b2428

jobs:
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: wohl
      - uses: actions/checkout@v4
        with:
          repository: pulseengine/relay
          path: relay
          ref: ${{ env.RELAY_REF }}
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85.0"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: wohl
      - name: cargo fmt --check (per workspace member)
        working-directory: wohl
        # `cargo fmt --all` reaches into local path-dependencies and would
        # fail on unrelated drift in sibling repos (relay/, rivet/). Run
        # per-package so the gate stays scoped to this workspace's members.
        run: |
          for c in wohl-leak wohl-temp wohl-air wohl-door wohl-power wohl-alert wohl-hub wohl-integration; do
            echo "::group::cargo fmt -p $c"
            cargo fmt -p "$c" --check
            echo "::endgroup::"
          done
      - name: cargo clippy
        working-directory: wohl
        run: cargo clippy --workspace --all-targets -- -D warnings

  cargo-deny:
    # Supply-chain gate: bans, licenses, advisories, sources.
    # Configuration lives in deny.toml at the repo root. Duplicate-
    # versions and unmaintained advisories currently warn rather than
    # fail (see deny.toml comment and #8 follow-ups).
    name: cargo-deny (supply-chain)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: wohl
      - uses: actions/checkout@v4
        with:
          repository: pulseengine/relay
          path: relay
          ref: ${{ env.RELAY_REF }}
          fetch-depth: 0
      # cargo-deny-action handles install + cache + invocation. v2 is
      # the current stable major (matches the action's tag scheme).
      # If we want SHA-pinning parity with the rest of this workflow,
      # bump to a sha256 in a follow-up — for now @v2 keeps us on
      # security patches in the v2 major automatically.
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: wohl/Cargo.toml
          command: check bans licenses advisories sources

  test:
    name: cargo test (workspace, incl. proptest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: wohl
      - uses: actions/checkout@v4
        with:
          repository: pulseengine/relay
          path: relay
          ref: ${{ env.RELAY_REF }}
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85.0"
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: wohl
      - name: cargo test
        working-directory: wohl
        run: cargo test --workspace --all-features

  kani:
    # Matrix split (was a single serial bash loop): each component gets
    # its own job so a Kani failure names the offending crate in the
    # GitHub UI without log-diving, and the 7 proofs run in parallel.
    # Crates are hardcoded — dynamic discovery would mean parsing
    # Cargo.toml at job-graph time, which GH Actions can't do cleanly.
    # When a new Kani-verified crate lands, add it here.
    name: "Kani: ${{ matrix.crate }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate:
          - wohl-leak
          - wohl-temp
          - wohl-air
          - wohl-door
          - wohl-power
          - wohl-alert
          - wohl-ota
    steps:
      - uses: actions/checkout@v4
        with:
          path: wohl
      - uses: actions/checkout@v4
        with:
          repository: pulseengine/relay
          path: relay
          ref: ${{ env.RELAY_REF }}
          fetch-depth: 0
      # Kani-verifier (the installer) needs newer Rust than our MSRV.
      # Kani itself uses an internal nightly for the proofs.
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: wohl
          key: kani-${{ matrix.crate }}
      - name: Cache Kani install
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-kani
            ~/.cargo/bin/kani
            ~/.kani
          # Shared Kani install cache across matrix cells: the toolchain
          # bits are crate-independent and large (~1 GB), so per-cell
          # caching would waste bandwidth and time. Per-crate target/
          # incremental dirs are covered by Swatinem/rust-cache above.
          key: kani-${{ runner.os }}-v1
      - name: Install Kani
        run: |
          if ! command -v cargo-kani >/dev/null 2>&1; then
            cargo install --locked kani-verifier
          fi
          cargo kani setup
      - name: Run Kani on ${{ matrix.crate }}
        working-directory: wohl
        run: cargo kani -p "${{ matrix.crate }}"

  fuzz-smoke:
    name: cargo-fuzz smoke (60s/target)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: wohl
      - uses: actions/checkout@v4
        with:
          repository: pulseengine/relay
          path: relay
          ref: ${{ env.RELAY_REF }}
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: wohl
          key: fuzz
      - name: Install cargo-fuzz
        # NOT --locked: cargo-fuzz 0.13.1's lockfile pins rustix 0.36.5 which
        # uses unstable rustc_attrs that current nightly no longer accepts.
        # Unlocked resolution picks newer rustix that compiles cleanly.
        run: cargo install cargo-fuzz
      - name: Fuzz fuzz_leak
        working-directory: wohl
        run: cargo fuzz run fuzz_leak -- -max_total_time=60
      - name: Fuzz fuzz_temp
        working-directory: wohl
        run: cargo fuzz run fuzz_temp -- -max_total_time=60

  rivet-validate:
    name: rivet validate (ASPICE artifacts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: wohl
      - uses: actions/checkout@v4
        with:
          repository: pulseengine/rivet
          path: rivet
          ref: ${{ env.RIVET_REF }}
          fetch-depth: 0
      # rivet-cli's deps need Rust 1.89+; we don't care about MSRV for tooling.
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rivet
          key: rivet-cli
      - name: Install rivet-cli
        run: cargo install --locked --path rivet/rivet-cli
      - name: rivet validate
        working-directory: wohl
        run: rivet validate

  verus:
    name: Verus (bazel test //proofs/verus)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: wohl
      - uses: actions/checkout@v4
        with:
          repository: pulseengine/rules_wasm_component
          path: rules_wasm_component
          ref: ${{ env.RULES_WASM_COMPONENT_REF }}
          fetch-depth: 0
      # rules_rocq_rust's module extension eagerly creates a
      # nixpkgs-backed rocq_toolchains repo at Bazel analysis time,
      # so every Bazel job needs nix-build on PATH (see MODULE.bazel
      # comment). Pinned to cachix/install-nix-action v31.10.6.
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3
      - uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-verus
          repository-cache: true
      - name: bazel test //proofs/verus:alert_dedup_verify
        working-directory: wohl
        run: bazel test //proofs/verus:alert_dedup_verify --test_output=summary
