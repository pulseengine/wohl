name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Pinned sibling-repo commits — bumped explicitly via PR. Without these
  # pins, unpinned `main` of relay/rivet can change tool behavior on this
  # workflow with zero wohl code change (see #8 for the concrete
  # incident that motivated pinning).
  #
  # IMPORTANT: every cross-repo checkout below uses `fetch-depth: 0`
  # because relay/rivet are routinely force-pushed by the architect.
  # Without a full fetch, an orphaned (rebased-away) SHA fails to
  # resolve under actions/checkout's default shallow strategy.
  RELAY_REF: 178ffd479ad863c91ece4f580379a9207c36a530
  RIVET_REF: 78f001e23d595ba816f7a7be59282194dedfdc12
  # Pinned rules_wasm_component for Bazel-running jobs (verus, future
  # bazel build //...). wohl's MODULE.bazel uses local_path_override
  # for local dev; CI checks out the pinned ref into a sibling path so
  # the override resolves.
  RULES_WASM_COMPONENT_REF: fbe20571eee9bd05687c95e7a43f6c236d9b2428
  # Pinned sigil for the build-stage attestation gate (sigil-attest job
  # signs the composed Matter component). Bumped via PR.
  SIGIL_REF: 54518f702a36f5f29a79f0a02859c502dacaa98a

jobs:
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: wohl
      - uses: actions/checkout@v4
        with:
          repository: pulseengine/relay
          path: relay
          ref: ${{ env.RELAY_REF }}
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.87.0"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: wohl
      - name: cargo fmt --check (per workspace member)
        working-directory: wohl
        # `cargo fmt --all` reaches into local path-dependencies and would
        # fail on unrelated drift in sibling repos (relay/, rivet/). Run
        # per-package so the gate stays scoped to this workspace's members.
        run: |
          for c in wohl-leak wohl-temp wohl-air wohl-door wohl-power wohl-alert wohl-hub wohl-integration; do
            echo "::group::cargo fmt -p $c"
            cargo fmt -p "$c" --check
            echo "::endgroup::"
          done
      - name: cargo clippy
        working-directory: wohl
        run: cargo clippy --workspace --all-targets -- -D warnings

  cargo-deny:
    # Supply-chain gate: bans, licenses, advisories, sources.
    # Configuration lives in deny.toml at the repo root. Duplicate-
    # versions and unmaintained advisories currently warn rather than
    # fail (see deny.toml comment and #8 follow-ups).
    name: cargo-deny (supply-chain)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: wohl
      - uses: actions/checkout@v4
        with:
          repository: pulseengine/relay
          path: relay
          ref: ${{ env.RELAY_REF }}
          fetch-depth: 0
      # cargo-deny-action handles install + cache + invocation. v2 is
      # the current stable major (matches the action's tag scheme).
      # If we want SHA-pinning parity with the rest of this workflow,
      # bump to a sha256 in a follow-up — for now @v2 keeps us on
      # security patches in the v2 major automatically.
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: wohl/Cargo.toml
          command: check bans licenses advisories sources

  test:
    name: cargo test (workspace, incl. proptest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: wohl
      - uses: actions/checkout@v4
        with:
          repository: pulseengine/relay
          path: relay
          ref: ${{ env.RELAY_REF }}
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.87.0"
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: wohl
      - name: cargo test
        working-directory: wohl
        run: cargo test --workspace --all-features

  kani:
    # Matrix split (was a single serial bash loop): each component gets
    # its own job so a Kani failure names the offending crate in the
    # GitHub UI without log-diving, and the 7 proofs run in parallel.
    # Crates are hardcoded — dynamic discovery would mean parsing
    # Cargo.toml at job-graph time, which GH Actions can't do cleanly.
    # When a new Kani-verified crate lands, add it here.
    name: "Kani: ${{ matrix.crate }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate:
          - wohl-leak
          - wohl-temp
          - wohl-air
          - wohl-door
          - wohl-power
          - wohl-alert
          - wohl-ota
    steps:
      - uses: actions/checkout@v4
        with:
          path: wohl
      - uses: actions/checkout@v4
        with:
          repository: pulseengine/relay
          path: relay
          ref: ${{ env.RELAY_REF }}
          fetch-depth: 0
      # Kani-verifier (the installer) needs newer Rust than our MSRV.
      # Kani itself uses an internal nightly for the proofs.
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: wohl
          key: kani-${{ matrix.crate }}
      - name: Cache Kani install
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-kani
            ~/.cargo/bin/kani
            ~/.kani
          # Shared Kani install cache across matrix cells: the toolchain
          # bits are crate-independent and large (~1 GB), so per-cell
          # caching would waste bandwidth and time. Per-crate target/
          # incremental dirs are covered by Swatinem/rust-cache above.
          key: kani-${{ runner.os }}-v1
      - name: Install Kani
        run: |
          if ! command -v cargo-kani >/dev/null 2>&1; then
            cargo install --locked kani-verifier
          fi
          cargo kani setup
      - name: Run Kani on ${{ matrix.crate }}
        working-directory: wohl
        run: cargo kani -p "${{ matrix.crate }}"

  fuzz-smoke:
    name: cargo-fuzz smoke (60s/target)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: wohl
      - uses: actions/checkout@v4
        with:
          repository: pulseengine/relay
          path: relay
          ref: ${{ env.RELAY_REF }}
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: wohl
          key: fuzz
      - name: Install cargo-fuzz
        # NOT --locked: cargo-fuzz 0.13.1's lockfile pins rustix 0.36.5 which
        # uses unstable rustc_attrs that current nightly no longer accepts.
        # Unlocked resolution picks newer rustix that compiles cleanly.
        run: cargo install cargo-fuzz
      - name: Fuzz fuzz_leak
        working-directory: wohl
        run: cargo fuzz run fuzz_leak -- -max_total_time=60
      - name: Fuzz fuzz_temp
        working-directory: wohl
        run: cargo fuzz run fuzz_temp -- -max_total_time=60

  rivet-validate:
    name: rivet validate (ASPICE artifacts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: wohl
      - uses: actions/checkout@v4
        with:
          repository: pulseengine/rivet
          path: rivet
          ref: ${{ env.RIVET_REF }}
          fetch-depth: 0
      # rivet-cli's deps need Rust 1.89+; we don't care about MSRV for tooling.
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rivet
          key: rivet-cli
      - name: Install rivet-cli
        run: cargo install --locked --path rivet/rivet-cli
      - name: rivet validate
        working-directory: wohl
        run: rivet validate

  verus:
    name: Verus (bazel test //proofs/verus)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: wohl
      - uses: actions/checkout@v4
        with:
          repository: pulseengine/rules_wasm_component
          path: rules_wasm_component
          ref: ${{ env.RULES_WASM_COMPONENT_REF }}
          fetch-depth: 0
      # rules_rocq_rust's module extension eagerly creates a
      # nixpkgs-backed rocq_toolchains repo at Bazel analysis time,
      # so every Bazel job needs nix-build on PATH (see MODULE.bazel
      # comment). Pinned to cachix/install-nix-action v31.10.6.
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3
      - uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-verus
          repository-cache: true
      - name: bazel test //proofs/verus:alert_dedup_verify
        working-directory: wohl
        run: bazel test //proofs/verus:alert_dedup_verify --test_output=summary

  bazel-build:
    # Catches drift in `rules_wasm_component` and in the
    # `src/wasm_component.rs` files that cargo never sees — each
    # monitor crate's Cargo [lib] points at plain/src/lib.rs, so cargo
    # clippy never type-checks the bindgen glue. `bazel build //:all`
    # exercises every `rust_wasm_component_bindgen` target on the
    # wasm32-wasip2 toolchain, closing that gap (issue #14).
    name: Bazel build (//:all — exercises WASM component glue)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: wohl
      - uses: actions/checkout@v4
        with:
          repository: pulseengine/relay
          path: relay
          ref: ${{ env.RELAY_REF }}
          fetch-depth: 0
      - uses: actions/checkout@v4
        with:
          repository: pulseengine/rules_wasm_component
          path: rules_wasm_component
          ref: ${{ env.RULES_WASM_COMPONENT_REF }}
          fetch-depth: 0
      # rules_rocq_rust's module extension eagerly creates a
      # nixpkgs-backed rocq_toolchains repo at Bazel analysis time,
      # so every Bazel job needs nix-build on PATH (see MODULE.bazel
      # comment). Pinned to the same SHA as the verus job above so
      # both stay aligned on cachix/install-nix-action v31.10.6.
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3
      - uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-bazel-build
          repository-cache: true
      # DIAGNOSTIC (spike SWARCH-WOHL-008): print exactly how the
      # regenerated @crates universe exposes rs-matter. The bazel-build
      # step keeps failing with "@crates//:rs-matter not declared" even
      # under CARGO_BAZEL_REPIN=1; rs-matter is a *git* dep (registry
      # deps like wit-bindgen alias fine). This query is the ground
      # truth: it forces repo generation and shows whether rs-matter is
      # aliased at all, and under what label. `|| true` so the log is
      # always emitted regardless of the build outcome that follows.
      - name: bazel build //:all
        working-directory: wohl
        # CARGO_BAZEL_REPIN=1 forces crate_universe to regenerate the
        # @crates repo from the current Cargo.lock + manifest on each
        # run. Needed because the universe seed grew (rs-matter added
        # for //:wohl-matter-core); without a repin, @crates can serve
        # a stale target set ("target 'rs-matter' not declared").
        # Repin re-resolves over the network, which CI has.
        env:
          CARGO_BAZEL_REPIN: "1"
        run: bazel build //:all

      # SWARCH-WOHL-008 C4 execution gate: prove the verified Matter core
      # actually RUNS — not just builds — by executing a full SPAKE2+ PASE
      # handshake across the wac_compose'd WIT boundary inside wasmtime. The
      # composed component (//:wohl-matter-composed) exports a bare `run`
      # world func returning true on handshake success; `wasmtime run
      # --invoke 'run()'` reaches it (interface-nested exports are not
      # CLI-invokable, hence the bare shape). Turns the locally-proven
      # spike2c result into a live CI gate.
      - name: Run composed PASE handshake under wasmtime (C4 execution gate)
        working-directory: wohl
        run: |
          set -euo pipefail
          bazel build //:wohl-matter-composed
          WASM=$(find "$(bazel info bazel-bin)" -name 'wohl-matter-composed.wasm' | head -1)
          test -n "$WASM"
          # Reuse the wasmtime the rules_wasm_component toolchain already
          # fetched (integrity-verified by bazel via MODULE.bazel.lock) — no
          # unpinned curl|bash download of an external install script.
          WT=$(find "$(bazel info output_base)/external" -type f -name wasmtime -path '*wasmtime*' 2>/dev/null | head -1)
          echo "composed=$WASM wasmtime=$WT"
          test -n "$WT"
          OUT=$("$WT" run --invoke 'run()' "$WASM")
          echo "run() => $OUT"
          if [ "$OUT" != "true" ]; then
            echo "::error::PASE handshake did NOT succeed in the composed graph"
            exit 1
          fi
          echo "PASE-RUNS-OK in CI: SPAKE2+ handshake completed across the wac-composed WIT seam"
          # Stage the composed component for the sigil-attest job (bazel-bin
          # is a symlink tree; copy out a real file for upload-artifact).
          cp -L "$WASM" "$GITHUB_WORKSPACE/wohl-matter-composed.wasm"

      - name: Upload composed component for attestation
        uses: actions/upload-artifact@v4
        with:
          name: wohl-matter-composed
          path: wohl-matter-composed.wasm
          if-no-files-found: error

  sigil-attest:
    # SWARCH-WOHL-008 step 6: build-stage attestation gate. Signs the
    # bazel-built composed component with sigil and confirms the detached
    # verifier accepts it and rejects tampering — the production form of the
    # locally-demonstrated chain in crates/wohl-matter-core/attestation/.
    # Separate job so the (heavy) sigil build doesn't lengthen bazel-build's
    # critical path; depends on bazel-build for the artifact.
    name: sigil attestation (sign composed component)
    runs-on: ubuntu-latest
    needs: bazel-build
    steps:
      - uses: actions/checkout@v4
        with:
          path: wohl
      - uses: actions/checkout@v4
        with:
          repository: pulseengine/sigil
          path: sigil
          ref: ${{ env.SIGIL_REF }}
          fetch-depth: 0
      # sigil's rust-toolchain.toml selects its own toolchain; this provides a
      # base so rustup can resolve it.
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: sigil
          key: sigil-attest
      - uses: actions/download-artifact@v4
        with:
          name: wohl-matter-composed
          path: artifact
      - name: Build sigil + sign/verify the composed component
        run: |
          set -euo pipefail
          cargo build --release --manifest-path sigil/Cargo.toml --bin sigil
          SIGIL="$PWD/sigil/target/release/sigil" \
          ARTIFACT="$PWD/artifact/wohl-matter-composed.wasm" \
            wohl/crates/wohl-matter-core/attestation/sign-verify.sh
