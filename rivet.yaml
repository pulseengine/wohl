project: wohl
description: Home supervision system built on PulseEngine
version: 0.1.0

artifact_dirs:
  - artifacts/sysreq
  - artifacts/swarch
  - artifacts/swdd
  - artifacts/swreq

artifact_types:
  - sysreq
  - swarch
  - swdd
  - swreq
  - unit-verification
  - sw-integration-verification

commit_trailers:
  required:
    - Implements
    - Fixes
    - Verifies
    - Refs
  exemptions:
    - chore
    - style
    - ci
    - docs
    - build
