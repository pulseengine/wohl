project:
  name: wohl
  version: "0.1.0"
  schemas:
    - common
    - aspice
    - stpa
    - stpa-sec
  description: >
    Home supervision system built on PulseEngine.
    Sensor nodes publish typed streams; hub runs verified monitor components.
    Each monitor is a stream transformer: stream<sensor-data> -> stream<alert>.

sources:
  - path: artifacts/sysreq
    format: generic-yaml
  - path: artifacts/swarch
    format: generic-yaml
  - path: artifacts/swreq
    format: generic-yaml
  - path: artifacts/swdd
    format: generic-yaml
  - path: artifacts/verification
    format: generic-yaml
  - path: safety/stpa
    format: generic-yaml
  - path: safety/stpa-sec
    format: generic-yaml

docs:
  - docs

results: results
